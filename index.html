<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Serenity - Mental Health Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
    <style>
        :root {
            --sage: #7a9e7e;
            --sage-light: #a8c5ac;
            --sage-pale: #eef4ef;
            --cream: #faf8f4;
            --charcoal: #2d2926;
            --stone: #8c8680;
            --mist: #dce8e4;
            --blush: #e8c4b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(122,158,126,0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(232,196,184,0.15) 0%, transparent 50%);
        }

        /* Shell */
        .chat-shell {
            max-width: 500px;
            height: 100vh;
            max-height: 820px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 0;
            box-shadow: 0 0 60px rgba(45,41,38,0.08);
        }

        @media (min-width: 576px) {
            body { display: flex; align-items: center; justify-content: center; padding: 24px; }
            .chat-shell { height: 90vh; border-radius: 24px; }
        }

        /* Header */
        .chat-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--sage-pale);
            background: #fff;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--sage), var(--sage-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            color: var(--charcoal);
            margin: 0;
        }

        .brand-sub {
            font-size: 0.68rem;
            color: var(--stone);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin: 0;
        }

        .status-badge {
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sage);
            background: var(--sage-pale);
            border: 1px solid rgba(122,158,126,0.25);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--sage);
            border-radius: 50%;
            animation: blink 2.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Mood buttons */
        .mood-label {
            font-size: 0.65rem;
            color: var(--stone);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .mood-btn {
            flex: 1;
            border: 1.5px solid var(--mist);
            background: transparent;
            border-radius: 10px;
            padding: 8px 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            color: var(--stone);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .mood-btn .e { font-size: 1.1rem; }
        .mood-btn:hover { border-color: var(--sage-light); background: var(--sage-pale); color: var(--charcoal); transform: translateY(-1px); }
        .mood-btn.active { border-color: var(--sage); background: var(--sage-pale); color: var(--charcoal); font-weight: 500; }

        /* Chat box */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fff;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 4px; }

        /* Message rows */
        .msg-row {
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { align-items: flex-end; }
        .msg-row.bot  { align-items: flex-start; }

        .msg-label {
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .msg-row.user .msg-label { color: var(--stone); }
        .msg-row.bot  .msg-label { color: var(--sage); }

        .bubble {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.88rem;
            line-height: 1.65;
            word-wrap: break-word;
        }

        .msg-row.user .bubble {
            background: var(--charcoal);
            color: var(--cream);
            border-bottom-right-radius: 4px;
        }

        .msg-row.bot .bubble {
            background: var(--sage-pale);
            color: var(--charcoal);
            border: 1px solid rgba(122,158,126,0.15);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing-bubble {
            background: var(--sage-pale);
            border: 1px solid rgba(122,158,126,0.15);
            padding: 13px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .t-dot {
            width: 7px;
            height: 7px;
            background: var(--sage);
            border-radius: 50%;
            animation: tdot 1.2s infinite ease-in-out;
        }

        .t-dot:nth-child(2) { animation-delay: 0.2s; }
        .t-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes tdot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Breathe section */
        .breathe-section {
            padding: 0 28px 14px;
            flex-shrink: 0;
        }

        .breathe-toggle {
            width: 100%;
            background: transparent;
            border: 1.5px solid var(--mist);
            border-radius: 12px;
            padding: 10px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            color: var(--stone);
            cursor: pointer;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .breathe-toggle:hover { border-color: var(--sage-light); color: var(--sage); background: var(--sage-pale); }

        .breathe-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px 0 8px;
            gap: 10px;
        }

        .breathe-panel.open { display: flex; }

        .breathe-orb {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, var(--sage-light), var(--sage-pale));
            box-shadow: 0 0 0 0 rgba(122,158,126,0.4);
            animation: orbBreath 8s ease-in-out infinite alternate;
        }

        @keyframes orbBreath {
            0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(122,158,126,0.3); }
            100% { transform: scale(1.5); box-shadow: 0 0 30px 10px rgba(122,158,126,0.1); }
        }

        .breathe-hint {
            font-size: 0.65rem;
            color: var(--stone);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Input section */
        .input-section {
            padding: 14px 28px 22px;
            border-top: 1px solid var(--sage-pale);
            background: #fff;
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--cream);
            border: 1.5px solid var(--mist);
            border-radius: 14px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap:focus-within {
            border-color: var(--sage-light);
            box-shadow: 0 0 0 3px rgba(122,158,126,0.08);
        }

        .input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: var(--charcoal);
        }

        .input-wrap input::placeholder { color: var(--stone); opacity: 0.7; }

        .btn-send {
            width: 38px;
            height: 38px;
            background: var(--charcoal);
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover { background: var(--sage); transform: scale(1.05); }
        .btn-send svg { width: 15px; height: 15px; stroke: white; }

        .btn-clear {
            background: none;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            color: var(--stone);
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-clear:hover { color: #e74c3c; background: #fdf0ee; }

        .disclaimer {
            font-size: 0.63rem;
            color: var(--stone);
            opacity: 0.55;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="chat-shell">

    <!-- Header -->
    <div class="chat-header">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div class="d-flex align-items-center gap-2">
                <div class="brand-icon">🌿</div>
                <div>
                    <p class="brand-name">Serenity</p>
                    <p class="brand-sub">Mental health companion</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span> Online
            </div>
        </div>

        <p class="mood-label mb-2">How are you feeling?</p>
        <div class="d-flex gap-2">
            <button class="mood-btn" onclick="setMood('Happy', this)">
                <span class="e">😊</span><span>Happy</span>
            </button>
            <button class="mood-btn" onclick="setMood('Tired', this)">
                <span class="e">😩</span><span>Tired</span>
            </button>
            <button class="mood-btn" onclick="setMood('Stressed', this)">
                <span class="e">🤯</span><span>Stressed</span>
            </button>
            <button class="mood-btn" onclick="setMood('Sad', this)">
                <span class="e">😢</span><span>Sad</span>
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-box">
        <div class="msg-row bot">
            <span class="msg-label">Serenity</span>
            <div class="bubble">Hi there 🌿 I'm Serenity — I'm here to listen. Whatever you're feeling right now, you don't have to face it alone. What's on your mind?</div>
        </div>
    </div>

    <!-- Breathe -->
    <div class="breathe-section">
        <button class="breathe-toggle" onclick="toggleBreathe()">
            🧘 Deep Breathing Exercise
        </button>
        <div class="breathe-panel" id="breathePanel">
            <div class="breathe-orb"></div>
            <span class="breathe-hint">Breathe in · Hold · Breathe out</span>
        </div>
    </div>

    <!-- Input -->
    <div class="input-section">
        <div class="input-wrap">
            <input
                type="text"
                id="userInput"
                placeholder="Share what's on your mind..."
                onkeypress="handleEnter(event)"
            />
            <button class="btn-clear" onclick="clearChat()">Clear</button>
            <button class="btn-send" onclick="sendMessage()">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <p class="disclaimer text-center mt-2">Not a substitute for professional mental health care</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    let currentEmotion = "Neutral";

    function setMood(emotion, btn) {
        currentEmotion = emotion;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleBreathe() {
        document.getElementById('breathePanel').classList.toggle('open');
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function addMessage(text, sender) {
        const chatBox = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = `msg-row ${sender}`;
        row.innerHTML = `
            <span class="msg-label">${sender === 'user' ? 'You' : 'Serenity'}</span>
            <div class="bubble">${text}</div>
        `;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addTyping() {
        const chatBox = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.id = 'typing-row';
        row.innerHTML = `
            <span class="msg-label">Serenity</span>
            <div class="typing-bubble">
                <span class="t-dot"></span>
                <span class="t-dot"></span>
                <span class="t-dot"></span>
            </div>
        `;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing-row');
        if (t) t.remove();
    }

    function clearChat() {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';
        addMessage("Cleared 🌿 Whenever you're ready, I'm here.", 'bot');
        fetch('/clear', { method: 'POST' });
    }

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const message = inputField.value.trim();
        if (!message) return;

        inputField.value = '';
        addMessage(message, 'user');
        addTyping();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, emotion: currentEmotion })
            });
            const data = await response.json();
            removeTyping();

            if (data.error) {
                addMessage('Something went wrong. Please try again.', 'bot');
            } else {
                let reply = (data.reply || data.response || '');
                reply = reply.replace(/[\s\S]*?<\/think>/g, '').trim();
                addMessage(reply, 'bot');
            }
        } catch {
            removeTyping();
            addMessage('Connection error. Is Ollama running?', 'bot');
        }
    }
</script>

</body>
</html>
